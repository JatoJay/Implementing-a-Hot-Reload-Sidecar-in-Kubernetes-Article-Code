apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx

  template:

    metadata:
      labels:
        app: nginx

    spec:

      containers:

      - name: nginx

        image: nginx:latest

        volumeMounts:
        - name: config
          mountPath: /etc/nginx

      - name: reloader

        image: ghcr.io/example/config-reloader:latest

        volumeMounts:
        - name: config
          mountPath: /etc/nginx

      volumes:

      - name: config

        configMap:
          name: nginx-config 
